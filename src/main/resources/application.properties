# Spring Boot application metadata
spring.application.name=simplified-data

# Disable web auto-configuration: Phase 2c is a non-web Spring Boot app.
# Phase 4+ may add controllers; if so, change this to ServletWebServerApplicationContext.
spring.main.web-application-type=none

# Actuator: expose health and metrics for L2 cache validation
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.enable.hibernate=true
management.metrics.enable.jvm=true

# Phase 4b: GitHub integration for the skyblock-data source.
# SKYBLOCK_DATA_GITHUB_TOKEN is a fine-grained PAT with zero repository access required;
# public repo content is always readable. When missing or blank, GitHubConfig degrades to
# unauthenticated requests (60 req/hr per IP) and logs a warning. Set for production to
# unlock the 5000 req/hr authenticated budget.
skyblock.data.github.token=${SKYBLOCK_DATA_GITHUB_TOKEN:}

# Phase 4c: scheduled AssetPoller watchdog configuration.
# poll-interval-seconds: delay between end-of-previous-cycle and start-of-next-cycle. Spring
#   uses fixedDelayString so a slow cycle never overlaps the next one.
# poll-enabled: master switch for the scheduled + startup entry points. Tests bypass the
#   live GitHub API by constructing the poller directly with pollEnabled=false.
# source-id: the ExternalAssetState.sourceId natural key and the string used in every
#   AssetPoller log message.
skyblock.data.github.poll-interval-seconds=60
skyblock.data.github.poll-enabled=true
skyblock.data.github.source-id=skyblock-data

# Phase 5: DiskOverlaySource local-override base directory. Resolved as java.nio.file.Path,
# either relative to the JVM working directory or absolute. The RemoteSkyBlockFactory joins
# this base with '<@Table.name>.json' per model to compute the per-entity overlay file path.
# Default value 'skyblock-data-overlay' is intentionally a non-existent relative directory so
# production DiskOverlaySource.load() calls fall straight through to the inner RemoteJsonSource
# with a single Files.exists() probe per model per refresh. Dev contributors point this at a
# local skyblock-data checkout (e.g. '../skyblock-data/data/v1' or an absolute path) to test
# overrides without pushing to GitHub.
skyblock.data.overlay.path=skyblock-data-overlay

# Phase 6b: write path configuration for the WritableRemoteJsonSource + WriteQueueConsumer +
# WriteBatchScheduler pipeline.
#   write-batch-interval-seconds:  fixedDelay cadence for WriteBatchScheduler.tick(); default 10s
#     means a tick that finds every source's buffer empty is a no-op, and a tick with
#     mutations produces one PUT per dirty source per 10-second window.
#   write-retry-initial-delay-minutes:  base delay for the exponential-backoff retry DelayQueue;
#     each retry doubles the delay (1m, 2m, 4m, 8m, 16m, 32m) starting here.
#   write-retry-max-attempts:  maximum retry attempts before dead-lettering to the
#     skyblock.writes.deadletter IMap. Default 5 = ~31 minutes total wall clock in the worst case.
#   write-412-immediate-retries:  separate immediate-retry cap on 412 Precondition Failed from
#     the Contents API PUT; each retry refetches the blob SHA and re-PUTs. Distinct from the
#     exponential-backoff path because 412 typically indicates a concurrent PUT from another
#     writer, which is resolved by a fresh blob SHA rather than a time delay.
#   write-consumer-enabled:  master switch for the WriteQueueConsumer daemon thread. Tests
#     bypass the live drain loop by constructing the consumer directly with enabled=false.
skyblock.data.github.write-batch-interval-seconds=10
skyblock.data.github.write-retry-initial-delay-minutes=1
skyblock.data.github.write-retry-max-attempts=5
skyblock.data.github.write-412-immediate-retries=3
skyblock.data.github.write-consumer-enabled=true
